baseURL = 'https://ban.ga'
languageCode = 'fr'
defaultContentLanguage = 'fr'
title = 'BANGA Romaric | Développeur Spring & Google Cloud | GDG Libreville | Gabon'
theme = 'PaperMod'
enableGitInfo = true

# Configuration Google Analytics (nouvelle méthode Hugo)
[services]
    [services.googleAnalytics]
        id = 'G-WHSESG5NQH'

[params]
author = "BANGA Romaric"
description = "Portfolio de BANGA Romaric Tanguy — VMware Spring Certified Professional 2024 v2, Google Cloud Associate Engineer, lead Spring developer à l'ANINF, organisateur du Google Developers Group Libreville."
keywords = ["BANGA Romaric", "Romaric Banga", "Spring Certified Professional", "VMware Spring Certified", "Broadcom Spring", "Spring Pro Gabon", "Spring developer Gabon", "développeur Spring Gabon", "Spring Boot Libreville", "Spring AI", "Spring AI Gabon", "Google Cloud Gabon", "GCP Cloud Engineer Gabon", "architecte cloud Gabon", "GDG Libreville", "DevFest Libreville", "Libreville", "ANINF", "Microservices", "Java Spring Boot", "Android Kotlin", "DevFest Gabon", "consulting Spring Afrique", "consulting IA générative Afrique", "formation Spring AI", "formation Spring Boot Gabon", "VMware Spring expert Afrique"]
env = "production"

# SEO et métadonnées
images = ["/images/og-default.jpg"]
defaultTheme = "auto"
disableThemeToggle = false

# Search Console & Webmaster verification
# Google Search Console : déjà vérifié via DNS (propriété de type "Domaine") — pas de meta tag nécessaire.
# Bing Webmaster Tools (optionnel) : https://www.bing.com/webmasters → ajouter ban.ga
#   → choisir "Meta tag" → copier le content → remplacer le placeholder ci-dessous, ou retirer le bloc si non utilisé.
[params.analytics]
  [params.analytics.bing]
  SiteVerificationTag = "308BF07CFE01FB477AA7479FC7ABA3A4"

# Newsletter — Buttondown (provider externe, POST depuis form embed). Le username est l'identifiant du compte Buttondown.
# IMPORTANT : après création du compte sur buttondown.email, vérifier que username ci-dessous correspond bien à ton identifiant final.
[params.newsletter]
provider = "buttondown"
username = "romaricbanga"
name = "Mbolo Letter"
tagline = "Un email à chaque nouvel article. [Pas plus.]"

# Schema.org — portfolio personnel, donc publisherType = Person (au lieu d'Organization par défaut)
[params.schema]
publisherType = "Person"
sameAs = [
  "https://www.linkedin.com/in/romaric-banga/",
  "https://github.com/bangaromaric",
  "https://x.com/bangaromaric",
  "https://gdg.community.dev/gdg-libreville/",
  "https://g.dev/romaricbanga"
]

# Profil et réseaux sociaux
ShowReadingTime = true
ShowShareButtons = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowWordCount = true
ShowRssButtonInSectionTermList = true

# Footer personnalisé
label.text = "© 2025 BANGA Romaric - Expert Spring & Google Cloud"
label.icon = ""
label.iconHeight = 0
UseHugoToc = true
disableSpecial1stPost = false
disableScrollToTop = false
comments = false
hidemeta = false
hideSummary = false
showtoc = false
tocopen = false

[sitemap]
changefreq = "weekly"
priority = 0.5
filename = "sitemap.xml"

# Related content — pour la section "Articles connexes" sur les posts
[related]
includeNewer = true
threshold = 60
toLower = false

[[related.indices]]
  name = "tags"
  weight = 80

[[related.indices]]
  name = "categories"
  weight = 60

[[related.indices]]
  name = "date"
  weight = 10

# Sections affichées sur la home et dans les listings
mainSections = ["posts", "projects"]

# Mode profile désactivé — la home est gérée par layouts/index.html (override éditorial)
[params.profileMode]
enabled = false

[[params.socialIcons]]
name = "email"
url = "mailto:bangaromaric@gmail.com"

[[params.socialIcons]]
name = "linkedin"
url = "https://www.linkedin.com/in/romaric-banga/"

[[params.socialIcons]]
name = "github"
url = "https://github.com/bangaromaric"

[[params.socialIcons]]
name = "twitter"
url = "https://x.com/bangaromaric"

[[params.socialIcons]]
name = "rss"
url = "/posts/index.xml"

# Menu principal
[[menu.main]]
name = "Accueil"
url = "/"
weight = 1

[[menu.main]]
name = "À propos"
url = "/about/"
weight = 2

[[menu.main]]
name = "Projets"
url = "/projects/"
weight = 3

[[menu.main]]
name = "Blog"
url = "/posts/"
weight = 4

[[menu.main]]
name = "Newsletter"
url = "/newsletter/"
weight = 5

[[menu.main]]
name = "GDG Libreville"
url = "/gdg/"
weight = 6

# Configuration pour GitHub Pages
[markup]
[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true