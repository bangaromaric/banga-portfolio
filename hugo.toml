baseURL = 'https://ban.ga'
languageCode = 'fr'
title = 'BANGA Romaric | Développeur Spring & Google Cloud | GDG Libreville | Gabon'
theme = 'PaperMod'

# Configuration Google Analytics (nouvelle méthode Hugo)
[services]
    [services.googleAnalytics]
        id = 'G-WHSESG5NQH'

[params]
author = "BANGA Romaric"
description = "Portfolio de BANGA Romaric Tanguy — VMware Spring Certified Professional 2024 v2, Google Cloud Associate Engineer, lead Spring developer à l'ANINF, organisateur du Google Developers Group Libreville."
keywords = ["BANGA Romaric", "Spring Certified Professional", "VMware Spring Certified", "Broadcom Spring", "Spring Pro Gabon", "Spring developer Gabon", "Spring AI", "Google Cloud Gabon", "GDG Libreville", "Libreville", "ANINF", "Microservices", "Java Spring Boot", "Android Kotlin", "DevFest Gabon", "consulting Spring Afrique", "formation Spring AI"]
env = "production"

# SEO et métadonnées
images = ["/images/og-default.jpg"]
defaultTheme = "auto"
disableThemeToggle = false

# Profil et réseaux sociaux
ShowReadingTime = true
ShowShareButtons = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowWordCount = true
ShowRssButtonInSectionTermList = true

# Footer personnalisé
label.text = "© 2025 BANGA Romaric - Expert Spring & Google Cloud"
label.icon = ""
label.iconHeight = 0
UseHugoToc = true
disableSpecial1stPost = false
disableScrollToTop = false
comments = false
hidemeta = false
hideSummary = false
showtoc = false
tocopen = false

[sitemap]
changefreq = "weekly"
priority = 0.5
filename = "sitemap.xml"

# Sections affichées sur la home et dans les listings
mainSections = ["posts", "projects"]

# Mode profile désactivé — la home est gérée par layouts/index.html (override éditorial)
[params.profileMode]
enabled = false

[[params.socialIcons]]
name = "email"
url = "mailto:bangaromaric@gmail.com"

[[params.socialIcons]]
name = "linkedin"
url = "https://www.linkedin.com/in/romaric-banga/"

[[params.socialIcons]]
name = "github"
url = "https://github.com/bangaromaric"

[[params.socialIcons]]
name = "twitter"
url = "https://x.com/bangaromaric"

[[params.socialIcons]]
name = "rss"
url = "/posts/index.xml"

# Menu principal
[[menu.main]]
name = "Accueil"
url = "/"
weight = 1

[[menu.main]]
name = "À propos"
url = "/about/"
weight = 2

[[menu.main]]
name = "Projets"
url = "/projects/"
weight = 3

[[menu.main]]
name = "Blog"
url = "/posts/"
weight = 4

[[menu.main]]
name = "GDG Libreville"
url = "/gdg/"
weight = 5

# Configuration pour GitHub Pages
[markup]
[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true