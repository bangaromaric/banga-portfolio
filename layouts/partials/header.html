<header class="site-header">
    <div class="site-header__inner">
        <a class="site-header__brand no-arrow" href="{{ "/" | absURL }}" aria-label="Accueil — BANGA Romaric">
            <span class="brand__mark">B</span>
            <span class="brand__word">Romaric <em>Banga</em></span>
        </a>

        <nav class="site-nav" aria-label="Navigation principale">
            <ul>
                {{- range site.Menus.main }}
                <li>
                    <a class="no-arrow{{ if eq $.RelPermalink .URL }} is-active{{ end }}" href="{{ .URL | absURL }}">{{ .Name }}</a>
                </li>
                {{- end }}
            </ul>
        </nav>

        <div class="site-header__util">
            {{- if not (site.Params.disableThemeToggle) }}
            <button id="theme-toggle" accesskey="t" title="(Alt + T)" aria-label="Basculer thème clair / sombre">
                <svg id="moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
                <svg id="sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="4"></circle>
                    <path d="M12 2v2"></path>
                    <path d="M12 20v2"></path>
                    <path d="m4.93 4.93 1.41 1.41"></path>
                    <path d="m17.66 17.66 1.41 1.41"></path>
                    <path d="M2 12h2"></path>
                    <path d="M20 12h2"></path>
                    <path d="m6.34 17.66-1.41 1.41"></path>
                    <path d="m19.07 4.93-1.41 1.41"></path>
                </svg>
            </button>
            {{- end }}
        </div>
    </div>
</header>

<style>
.site-header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: color-mix(in srgb, var(--paper) 94%, transparent);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--rule);
}
.site-header__inner {
    max-width: var(--w-page);
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--s-5);
    padding: var(--s-3) 0;
}
.site-header__brand {
    display: inline-flex;
    align-items: center;
    gap: var(--s-3);
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 1.15rem;
    color: var(--ink);
    letter-spacing: -0.01em;
    background-image: none !important;
}
.site-header__brand em {
    font-style: italic;
    font-weight: 380;
    color: var(--ink-muted);
}
.brand__mark {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 30px;
    height: 30px;
    font-family: var(--font-display);
    font-style: italic;
    font-weight: 500;
    font-size: 0.95rem;
    background: var(--terracotta);
    color: var(--paper);
    border-radius: 2px;
    line-height: 1;
}
.site-nav ul {
    display: flex;
    gap: var(--s-5);
    list-style: none;
    padding: 0;
    margin: 0;
}
.site-nav a {
    font-family: var(--font-mono);
    font-size: 0.78rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-muted);
    background-image: none !important;
    transition: color 200ms;
    padding: 4px 0;
    position: relative;
}
.site-nav a:hover,
.site-nav a.is-active { color: var(--ink); }
.site-nav a.is-active::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: -2px;
    height: 2px;
    background: var(--terracotta);
}
.site-header__util button {
    background: transparent;
    border: 1px solid var(--rule);
    border-radius: 50%;
    width: 36px;
    height: 36px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--ink);
    transition: border-color 200ms, color 200ms, transform 200ms;
}
.site-header__util button:hover { border-color: var(--ink); transform: rotate(15deg); }
.site-header__util #moon { display: none; }
.dark .site-header__util #moon { display: inline-block; }
.dark .site-header__util #sun { display: none; }

@media (max-width: 720px) {
    .site-header__inner { flex-wrap: wrap; gap: var(--s-3); padding: var(--s-3) 0; }
    .site-nav { order: 3; width: 100%; border-top: 1px solid var(--rule); padding-top: var(--s-3); }
    .site-nav ul { gap: var(--s-4); flex-wrap: wrap; }
    .brand__word { display: none; }
}
</style>
